# デバイスごとにカラーテーマを変更 (windows=Nord, wsl=Catppuccin Macchiato)
palette = "windows"

# promptのカラーを設定しています、$変数は後述で設定している変数が差し込まれます
format = """
$directory\
[](fg:accent bg:git_bg)\
$git_branch\
$git_status\
[](fg:git_bg)\
$fill\
[](fg:lang_bg)\
$nodejs\
$rust\
$golang\
$php\
[](fg:time_bg bg:lang_bg)\
$time\
[](fg:accent bg:time_bg)\
$os\
[](fg:accent)\
\n$character"""

# コマンドラインに1行分のスペースを入れない
add_newline = false

# left_promptとright_promptの間を何で埋めるか設定
[fill]
symbol = ' '

[os]
format = "[$symbol]($style)"
style = "fg:accent_fg bg:accent bold"
disabled = false

[os.symbols]
Macos = "  " # nf-fa-apple
Ubuntu = "  " # nf-linux-ubuntu
Debian = "  " # nf-linux-debian

[directory]
style = "fg:accent_fg bg:accent bold"
format = "[ $path ]($style)"
truncation_length = 10
truncate_to_repo = true
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = ""
style = "bg:git_bg"
format = '[[ $symbol $branch ](fg:git_fg bg:git_bg)]($style)'

[git_status]
style = "bg:git_bg"
format = '[[($all_status$ahead_behind )](fg:git_fg bg:git_bg)]($style)'

[nodejs]
symbol = ""
style = "bg:lang_bg"
format = '[[ $symbol ($version) ](fg:git_fg bg:lang_bg)]($style)'

[rust]
symbol = ""
style = "bg:lang_bg"
format = '[[ $symbol ($version) ](fg:git_fg bg:lang_bg)]($style)'

[golang]
symbol = ""
style = "bg:lang_bg"
format = '[[ $symbol ($version) ](fg:git_fg bg:lang_bg)]($style)'

[php]
symbol = ""
style = "bg:lang_bg"
format = '[[ $symbol ($version) ](fg:git_fg bg:lang_bg)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:time_bg"
format = '[[  $time ](fg:time_fg bg:time_bg)]($style)'

# パレット定義: デバイスごとのカラーテーマ
# Windows: Nord
[palettes.windows]
accent = "#88C0D0"
accent_fg = "#2E3440"
git_bg = "#394260"
git_fg = "#769ff0"
lang_bg = "#212736"
time_bg = "#1d2230"
time_fg = "#a0a9cb"

# WSL/Ubuntu: Catppuccin Macchiato
[palettes.wsl]
accent = "#c6a0f6"
accent_fg = "#181926"
git_bg = "#363a4f"
git_fg = "#b7bdf8"
lang_bg = "#1e2030"
time_bg = "#181926"
time_fg = "#a5adcb"
