# デバイスごとにカラーテーマを変更 (windows=M365Princess, wsl=M365Princess Cool)
palette = "windows"

# promptのカラーを設定しています、$変数は後述で設定している変数が差し込まれます
format = """
$directory\
[](fg:accent bg:git_bg)\
$git_branch\
$git_status\
[](fg:git_bg)\
$fill\
[](fg:mem_bg)\
$memory_usage\
[](fg:lang_bg bg:mem_bg)\
$nodejs\
$rust\
$golang\
$php\
[](fg:time_bg bg:lang_bg)\
$time\
[](fg:os_bg bg:time_bg)\
$os\
[](fg:os_bg)\
\n$character"""

# コマンドラインに1行分のスペースを入れない
add_newline = false

[character]
success_symbol = "[❯](bold #6BCB77)"
error_symbol = "[❯](bold #FF6B6B)"

# left_promptとright_promptの間を何で埋めるか設定
[fill]
symbol = ' '

[os]
format = "[$symbol]($style)"
style = "fg:os_fg bg:os_bg bold"
disabled = false

[os.symbols]
Windows = "󰍲 "
Macos = "  " # nf-fa-apple
Ubuntu = "  " # nf-linux-ubuntu
Debian = "  " # nf-linux-debian

[directory]
style = "fg:accent_fg bg:accent bold"
format = "[ $path ]($style)"
truncation_length = 10
truncate_to_repo = true
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = ""
style = "bg:git_bg"
format = '[[ $symbol $branch ](fg:git_fg bg:git_bg)]($style)'

[git_status]
style = "bg:git_bg"
format = '[[($all_status$ahead_behind )](fg:git_fg bg:git_bg)]($style)'

[memory_usage]
disabled = false
threshold = 0
style = "bg:mem_bg"
format = '[[ RAM $ram_pct ](fg:mem_fg bg:mem_bg)]($style)'

[nodejs]
symbol = ""
style = "bg:lang_bg"
format = '[[ $symbol ($version) ](fg:lang_fg bg:lang_bg)]($style)'

[rust]
symbol = ""
style = "bg:lang_bg"
format = '[[ $symbol ($version) ](fg:lang_fg bg:lang_bg)]($style)'

[golang]
symbol = ""
style = "bg:lang_bg"
format = '[[ $symbol ($version) ](fg:lang_fg bg:lang_bg)]($style)'

[php]
symbol = ""
style = "bg:lang_bg"
format = '[[ $symbol ($version) ](fg:lang_fg bg:lang_bg)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:time_bg"
format = '[[  $time ](fg:time_fg bg:time_bg)]($style)'

# パレット定義: デバイスごとのカラーテーマ
# 左側 (accent, git) は共通、右側 (mem, lang, time, os) はデバイスごとに変更

# Windows: Pop Candy (暖色系の右側)
[palettes.windows]
accent = "#FF6B6B"
accent_fg = "#FFFFFF"
git_bg = "#FFD93D"
git_fg = "#333333"
mem_bg = "#4D96FF"
mem_fg = "#FFFFFF"
lang_bg = "#6BCB77"
lang_fg = "#1A3C1A"
time_bg = "#C084FC"
time_fg = "#FFFFFF"
os_bg = "#4D96FF"
os_fg = "#FFFFFF"

# WSL/Ubuntu: Pop Candy Cool (寒色系の右側)
[palettes.wsl]
accent = "#FF6B6B"
accent_fg = "#FFFFFF"
git_bg = "#FFD93D"
git_fg = "#333333"
mem_bg = "#EF476F"
mem_fg = "#FFFFFF"
lang_bg = "#118AB2"
lang_fg = "#FFFFFF"
time_bg = "#8338EC"
time_fg = "#FFFFFF"
os_bg = "#FF8C42"
os_fg = "#FFFFFF"
